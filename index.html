<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aperture Terminal</title>

<style>
body{
    margin:0;
    background:#000;
    color:#ff8c00;
    font-family:Consolas,monospace;
    overflow:hidden;
}

/* FLICKER */
body.flicker{
    animation:flicker .12s infinite;
}

@keyframes flicker{
    0%{opacity:1}
    20%{opacity:.9}
    40%{opacity:1}
    60%{opacity:.85}
    80%{opacity:1}
    100%{opacity:.95}
}

/* LOGO CONTAINER */
#logo-container{
    position:fixed;
    top:25px;
    left:25px;
    font-size:11px;
    line-height:1.2;
    white-space:pre;
    color:#ff8c00;
    text-shadow:0 0 8px #ff8c00;
    z-index:10;
    user-select:none;
    pointer-events:none;
    font-family:Consolas,monospace;
}

/* TERMINAL */
#terminal{
    padding:25px;
    padding-left:250px;
    white-space:pre-wrap;
    line-height:1.6;
    text-shadow:0 0 8px #ff8c00;
    min-height:100vh;
}

/* INPUT */
.input-line{
    display:flex;
}

.prompt{
    margin-right:10px;
    color:#ffb347;
}

input{
    background:none;
    border:none;
    outline:none;
    color:#ff8c00;
    font:inherit;
    width:100%;
}

input::placeholder{
    color:#ff8c00;
    opacity:0.5;
}

/* CREDITS */
#credits{
    position:fixed;
    inset:0;
    background:black;
    color:#ff8c00;
    font-family:Consolas,monospace;
    text-align:center;
    padding-top:40vh;
    font-size:26px;
    animation:scroll 25s linear forwards;
    white-space:pre-line;
}

@keyframes scroll{
    from{transform:translateY(100vh);}
    to{transform:translateY(-120%);}
}

/* SHUTDOWN */
#shutdown{
    position:fixed;
    inset:0;
    background:black;
    color:#ff8c00;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Consolas;
    font-size:18px;
}
</style>
</head>

<body>

<audio id="bgm" loop>
    <source src="./audio/audio.mp3" type="audio/mpeg">
</audio>

<div id="logo-container"></div>
<div id="terminal"></div>

<script>

const terminal = document.getElementById("terminal");
const logoContainer = document.getElementById("logo-container");
const bgm = document.getElementById("bgm");

/* ASCII LOGOS */
const logos = [
`    ___    ____  ____  __________  ____________
   / _ |  / __ \\/ __ \\/_  __/ / / / ____/ ____/
  / __ | / /_/ / / / / / / / / / / __/ / __/   
 / ___ |/ ____/ /_/ / / / / /_/ / /___/ /___   
/_/  |_/_/   \\____/ /_/  \\____/_____/_____/   `,
`
  ‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēó
  ‚ēĎ    APERTURE SCIENCE LAB       ‚ēĎ
  ‚ēĎ      TEST CHAMBER ACTIVE      ‚ēĎ
  ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ`,
`
   ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó
  ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚ēö‚ēź‚ēź‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ
  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ   ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  
  ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ  ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ  
  ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ   ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó
  ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ   ‚ēö‚ēź‚ēĚ    ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ`
];

let currentLogoIndex = 0;

function displayLogo(){
    logoContainer.textContent = logos[currentLogoIndex];
}

/* AUDIO AUTO START (browser-safe) */
let musicStarted = false;

function startMusic(){
    if(musicStarted) return;
    musicStarted = true;

    bgm.volume = 0.5;
    bgm.muted = false;

    const playPromise = bgm.play();
    if (playPromise !== undefined) {
        playPromise.catch(error => {
            console.log("Audio playback failed:", error);
        });
    }
}

document.addEventListener("click", startMusic);
document.addEventListener("keydown", startMusic);
document.addEventListener("touchstart", startMusic);

/* TYPE SYSTEM */
function typeLine(text, speed=10){
    return new Promise(resolve=>{
        let i=0;
        function step(){
            if(i<text.length){
                terminal.innerHTML+=text[i];
                i++;
                setTimeout(step,speed);
            }else{
                terminal.innerHTML+="\n";
                resolve();
            }
        }
        step();
    });
}

/* BOOT */
async function boot(){

    displayLogo();

    const intro=[
        "APERTURE SCIENCE COMPUTER-AIDED ENRICHMENT CENTER",
        "",
        "----------------------------------------",
        "[ OK ] Core Systems Online",
        "[ OK ] AI Interface Active",
        "[ OK ] Monitoring Systems Stable",
        "",
        "----------------------------------------",
        "",
        "Type 'help' for available commands"
    ];

    for(const line of intro){
        await typeLine(line,8);
    }

    createInput();
}

/* INPUT */
function createInput(){

    const row=document.createElement("div");
    row.className="input-line";

    row.innerHTML=`
        <span class="prompt">aperture@facility:~$</span>
        <input autofocus placeholder="">
    `;

    terminal.appendChild(row);

    const input=row.querySelector("input");
    input.focus();

    input.addEventListener("keydown",(e)=>{

        startMusic(); // unlock audio on first input

        if(e.key==="Enter"){

            const cmd=input.value.trim().toLowerCase();
            row.remove();
            run(cmd);
        }

    });
}

/* COMMANDS */
async function run(cmd){

    terminal.innerHTML+="aperture@facility:~$ "+cmd+"\n";

    if(cmd==="bio"){
        await typeLine(
            `NAME: ARTEM
ROLE: DEVELOPER, PROGRAMIST
STATUS: ACTIVE`,
            8
        );
        createInput();
        return;
    }

    if(cmd==="help"){
        await typeLine(
            `COMMANDS LIST:
  bio        - Display developer information
  logo       - Cycle ASCII logo design
  end        - Start credits sequence
  clear      - Clear terminal screen`,
            8
        );
        createInput();
        return;
    }

    if(cmd==="logo"){
        currentLogoIndex = (currentLogoIndex + 1) % logos.length;
        displayLogo();
        await typeLine("Logo design changed",8);
        createInput();
        return;
    }

    if(cmd==="end"){
        startCredits();
        return;
    }

    if(cmd==="clear"){
        terminal.innerHTML="";
        createInput();
        return;
    }

    if(cmd===""){
        createInput();
        return;
    }

    await typeLine(`unknown command '${cmd}' - type 'help' for available commands`,8);
    createInput();
}

/* FLICKER */
function flicker(){
    document.body.classList.add("flicker");
    setTimeout(()=>document.body.classList.remove("flicker"),4000);
}
setInterval(flicker,12000);

/* CREDITS */
function startCredits(){

    document.body.innerHTML=`
    <div id="credits">
APERTURE SCIENCE

DEVELOPER
PORTALARTMOP

SPECIAL THANKS

COMPANION CUBE

THE CAKE IS A LIE
    </div>
    `;

    setTimeout(shutdown,24000);
}

/* SHUTDOWN */
function shutdown(){
    document.body.innerHTML=`
    <div id="shutdown">
SYSTEM SHUTDOWN COMPLETE<br>
SIGNAL LOST
    </div>
    `;
}

boot();

</script>

</body>
</html>
